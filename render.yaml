services:
  # ── Single Web Service (API + React client served by Express) ────────────────
  - type: web
    name: dondoscheduleing
    env: node
    region: oregon
    plan: free              # upgrade to starter ($7/mo) for always-on
    buildCommand: npm --prefix client install && npm --prefix client run build && npm --prefix server install
    startCommand: npm --prefix server start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false         # set to this service's URL, e.g. https://dondoscheduleing.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
