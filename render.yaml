services:
  # ── API (Node/Express) ───────────────────────────────────────────────────────
  - type: web
    name: moz-scheduler-api
    env: node
    region: oregon
    plan: free              # upgrade to starter ($7/mo) for always-on
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false         # fill in Render dashboard
      - key: JWT_SECRET
        generateValue: true # Render generates this automatically
      - key: CLIENT_URL
        sync: false         # set to your static site URL, e.g. https://moz-scheduler.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

  # ── React Client (Static Site) ───────────────────────────────────────────────
  - type: web
    name: moz-scheduler
    env: static
    region: oregon
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false         # set to your API URL, e.g. https://moz-scheduler-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
